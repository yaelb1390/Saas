# BM Business OS — Orquestación de servicios para desarrollo
# Servicios: app (php-fpm), web (nginx), postgres, redis, queue (Horizon), n8n
name: bmbusinessos

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bmos_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bmos

  web:
    image: nginx:1.27-alpine
    container_name: bmos_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - bmos

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bmos_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --backoff=5 --timeout=120
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bmos

  # Planificador de tareas (respaldo diario, etc.). schedule:work no necesita cron del sistema:
  # se queda en primer plano lanzando las tareas vencidas cada minuto.
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bmos_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bmos

  postgres:
    image: postgres:16-alpine
    container_name: bmos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bmbusinessos}
      POSTGRES_USER: ${DB_USERNAME:-bmos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bmos} -d ${DB_DATABASE:-bmbusinessos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bmos

  redis:
    image: redis:7-alpine
    container_name: bmos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - bmos

  # NOTA: el host ya tiene una instancia de n8n en el puerto 5678. Este servicio queda
  # definido para entornos limpios pero mapeado a 5679 para evitar conflicto. Si reutilizas
  # tu n8n existente, no lo levantes y apunta N8N_BASE_URL a esa instancia.
  n8n:
    image: n8nio/n8n:latest
    container_name: bmos_n8n
    restart: unless-stopped
    profiles: ["n8n"]
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5679/
      GENERIC_TIMEZONE: America/Santo_Domingo
    ports:
      - "5679:5678"
    volumes:
      - n8ndata:/home/node/.n8n
    networks:
      - bmos

  # Evolution API (WhatsApp). Perfil opcional: `docker compose --profile whatsapp up -d evolution`.
  # Reutiliza el Postgres y el Redis del stack (Evolution crea su propio esquema).
  # Tras levantarlo: EVOLUTION_BASE_URL=http://evolution:8080 y EVOLUTION_API_KEY=<AUTHENTICATION_API_KEY>.
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: bmos_evolution
    restart: unless-stopped
    profiles: ["whatsapp"]
    environment:
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-bmos-evolution-key}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USERNAME:-bmos}:${DB_PASSWORD:-secret}@postgres:5432/${DB_DATABASE:-bmbusinessos}?schema=evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CONFIG_SESSION_PHONE_CLIENT: BM Business OS
      CONFIG_SESSION_PHONE_NAME: Chrome
      LOG_LEVEL: ERROR
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - evolutiondata:/evolution/instances
    networks:
      - bmos

networks:
  bmos:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  n8ndata:
  evolutiondata:
