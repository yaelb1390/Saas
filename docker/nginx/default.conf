# BM Business OS — Nginx para Laravel 12
server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # DNS interno de Docker. Nginx resuelve «app» UNA sola vez al arrancar si se escribe fijo en
    # fastcgi_pass; entonces, al recrear el contenedor de la app (que recibe una IP nueva), nginx
    # seguía apuntando a la IP vieja y todo el sitio caía con 502 hasta reiniciarlo a mano.
    # Con este resolver + la variable de abajo, la IP se vuelve a resolver sola.
    resolver 127.0.0.11 valid=10s ipv6=off;

    charset utf-8;
    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # Al pasar por una variable, nginx resuelve el nombre en cada petición (usando el resolver
        # de arriba) en vez de fijar la IP al arrancar.
        set $upstream_app app:9000;
        fastcgi_pass $upstream_app;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
