; BM Business OS — Configuración PHP
memory_limit = 512M
upload_max_filesize = 50M
post_max_size = 50M
max_execution_time = 120
max_input_vars = 5000
date.timezone = America/Santo_Domingo

; Realpath cache — crítico sobre bind mounts (Windows/macOS): evita re-resolver rutas de
; archivo en cada petición, principal causa de lentitud en Docker Desktop.
realpath_cache_size = 8192K
realpath_cache_ttl = 600

; OPcache — bytecode en memoria. validate_timestamps=0 evita que opcache re-verifique los
; archivos en cada ventana de tiempo (esa revalidación sobre el volumen montado de Windows es
; la causa de los picos de lentitud). Con esto la app queda SIEMPRE rápida; el precio es que,
; tras cambiar código/vistas, hay que refrescar opcache reiniciando el contenedor:
;   docker compose restart app queue
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 30000
opcache.validate_timestamps = 0
opcache.save_comments = 1
